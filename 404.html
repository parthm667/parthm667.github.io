<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>parthm667.github.io</title>
    <script>
      // SPA GitHub Pages fallback (rafgraph/spa-github-pages technique).
      // Rewrites the path into a query string the index.html bootstrap restores.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
