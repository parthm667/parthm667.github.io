    <script>
      // SPA GitHub Pages fallback restore (rafgraph technique).
      // When 404.html redirects with /?/<original-path>, replay the URL
      // before React mounts so BrowserRouter sees the right path.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
