    - generic [ref=e97]:
      - generic [ref=e98]:
        - paragraph [ref=e99]: 03 / How we got here
        - heading "The streets weren't always for cars." [level=2] [ref=e100]:
          - text: The streets weren't
          - text: always for cars.
      - article [ref=e101]:
        - paragraph [ref=e102]:
          - generic [ref=e103]: I
          - text: n the 1920s, American streets belonged to everyone. Pedestrians, cyclists, streetcars, children, and early autos all shared the road. When car ownership started to rise and pedestrian deaths began spiking, the public directed its anger at drivers.
        - paragraph [ref=e104]:
          - text: A coalition of car dealers, manufacturers, and auto clubs that the historian Peter Norton calls
          - strong [ref=e105]: motordom
          - text: spent the next decade changing that. They lobbied for new traffic laws that gave cars legal priority on public roads. They coined the word
          - emphasis [ref=e106]: jaywalker
          - text: and pushed it relentlessly to shift the blame onto pedestrians for getting hit. By the end of the decade, motordom had won. Streets were spaces for cars, and cars had legal priority over people on foot.
        - figure "1920s American street with mixed pedestrian, streetcar, and auto traffic" [ref=e107]:
          - img "placeholder" [ref=e108]:
            - img [ref=e109]:
              - generic [ref=e132]: ARCHIVAL PHOTO PLACEHOLDER
              - generic [ref=e133]: AMERICAN STREET, c. 1920 · LIBRARY OF CONGRESS
          - generic [ref=e134]: A typical American street before the auto industry's PR campaign. Pedestrians, streetcars, cyclists, and cars share the same right-of-way.
        - paragraph [ref=e135]:
          - text: Once motordom had won control of the streets, the engineering profession built its standards around the assumption that roads exist to move cars as fast as possible. The American Association of State Highway and Transportation Officials (AASHTO) published a design manual called the
          - emphasis [ref=e136]: Green Book
          - text: "that became the standard reference for road engineers across the country. It set rules for how wide lanes should be, how long sight lines had to be, and what speed roads should be designed for. All of it was built around one assumption:"
          - strong [ref=e137]: giving drivers more room to correct their mistakes would make roads safer.
        - paragraph [ref=e138]: The Green Book set rules for lane width, sight lines, design speeds, and shoulder size, and all of them were built around the same assumption that faster, wider roads are safer. Pedestrians and cyclists were not part of the math.
        - complementary "Interactive lane width demonstrator" [ref=e139]:
