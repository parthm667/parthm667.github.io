          - generic [ref=e289]:
            - paragraph [ref=e290]: Bad drivers exist everywhere. People get distracted and tired, and they drive impaired. The question is why the same kinds of mistakes produce a fatality in one country and a minor crash in another.
            - paragraph [ref=e291]: "Dumbaugh & Li examined fatal crashes across the San Antonio metro area and found they cluster on a specific kind of road: wide arterials with high design speeds and few pedestrian protections. Streets with shorter blocks and narrower lanes had a fraction of the fatalities, even though plenty of bad drivers used them too. The road is what makes a mistake deadly, not the driver."
            - paragraph [ref=e292]: Dumbaugh & Li (2011) · Designing for the Safety of Pedestrians, Cyclists, and Motorists in Urban Environments
