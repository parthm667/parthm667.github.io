            - generic [ref=e334]:
              - paragraph [ref=e336]: Live preview · edit freely
              - textbox "Letter draft" [ref=e337]: Dear members of the [your town] council, I am writing as a resident of our town. I am asking you to treat road safety as a design problem, not a driver-behavior problem. The streets in our town are built in ways that make crashes more likely, and more deadly when they happen. The research is well established. Wide arterials with high design speeds concentrate fatalities; narrower lanes, daylit corners, and slower speed limits dramatically reduce them (Dumbaugh & Li, 2011; Marshall & Ferenchak, 2019). Hoboken, NJ has now gone seven years without a single traffic death using only high-visibility crosswalk paint, flexible posts at corners, a citywide 20 mph speed limit, and leading pedestrian intervals at signals. None of those measures was expensive. None of them was controversial. They were folded into ordinary repaving budgets. I am asking the council to (1) commission a crash-data review of the most dangerous corridors in our town, (2) lower the default urban speed limit to 20 mph where pedestrians are present, and (3) adopt a continental crosswalk standard at the next repaving cycle. I would be glad to attend a future meeting to speak in support of these changes. Sincerely, [Your name]
