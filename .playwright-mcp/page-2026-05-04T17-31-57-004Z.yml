    - generic [ref=e174]:
      - generic [ref=e179]:
        - paragraph [ref=e180]: 04 / The counterfactual · Hoboken, NJ
        - heading "7+ years. Zero traffic deaths. One mile from Manhattan." [level=2] [ref=e181]:
          - generic [ref=e182]: 7+ years.
          - emphasis [ref=e184]: Zero traffic deaths.
          - generic [ref=e185]: One mile from Manhattan.
        - paragraph [ref=e186]: Hoboken, New Jersey · pop. 60,419
      - generic [ref=e187]:
        - paragraph [ref=e188]: None of what Hoboken did was expensive or technically complicated. The four interventions below were paid for through ordinary repaving budgets and signal-software updates, and rolled out citywide over a few years.
        - article [ref=e189]:
          - img [ref=e191]
          - generic [ref=e200]:
            - paragraph [ref=e201]: 01 · High-visibility paint
            - heading "They repainted every crosswalk so drivers had to see them." [level=3] [ref=e202]
            - paragraph [ref=e203]: Continental-style stripes use wide white bars instead of two thin parallel lines, so they're visible to a driver going 30 mph and not just to someone standing on the sidewalk. Hoboken now repaints every crosswalk during routine repaving. The cost is basically nothing.
        - article [ref=e204]:
          - img [ref=e206]
          - generic [ref=e236]:
            - paragraph [ref=e237]: 02 · Daylighting
            - heading "Flexible posts at every corner. Drivers can suddenly see kids." [level=3] [ref=e238]
            - paragraph [ref=e239]: Parking is removed for about 25 feet before each crosswalk and replaced with flexible posts. Drivers can now see pedestrians at the corner instead of having their view blocked by parked cars. The intervention costs roughly $200 per corner.
        - article [ref=e240]:
          - img [ref=e242]:
            - generic [ref=e245]: SPEED
            - generic [ref=e246]: LIMIT
            - generic [ref=e247]: "20"
            - generic [ref=e248]: M·P·H
          - generic [ref=e249]:
            - paragraph [ref=e250]: 03 · Speed limit
            - heading "Citywide 20 mph. A ten-percent drop with disproportionate effect." [level=3] [ref=e251]
            - paragraph [ref=e252]: A pedestrian struck at 25 mph has roughly a 1-in-4 chance of dying. At 20 mph it falls to about 1-in-10. Hoboken changed the signs and repainted the lane widths to be narrower. Drivers slowed down because the street was designed for it, not because of additional enforcement.
        - article [ref=e253]:
          - img [ref=e255]:
            - generic [ref=e265]: WAIT
            - generic [ref=e266]: +3s
          - generic [ref=e267]:
            - paragraph [ref=e268]: 04 · Leading pedestrian intervals
            - heading "A three-second head start at every signal." [level=3] [ref=e269]
            - paragraph [ref=e270]: When the light changes, the walk signal goes white before the green. Pedestrians get to enter the crosswalk first, so turning drivers see them before they start to turn. It costs nothing to add (just a software change at the signal cabinet), and it eliminates one of the most common right-hook crashes.
        - blockquote [ref=e271]:
          - paragraph [ref=e272]:
            - text: Cars still drive on Hoboken streets. People still get to work.
            - emphasis [ref=e273]: The roads were just redesigned so they don't kill anyone.
