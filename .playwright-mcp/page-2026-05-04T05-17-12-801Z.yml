        - paragraph [ref=e101]: 03 — How we got here
        - heading "The streets weren't always for cars." [level=2] [ref=e102]:
          - text: The streets weren't
          - text: always for cars.
      - article [ref=e103]:
        - paragraph [ref=e104]:
          - generic [ref=e105]: I
          - text: n the 1920s, American streets belonged to everyone. Pedestrians, cyclists, streetcars, children, and early autos all shared the same asphalt. When car ownership began to climb and the body count rose with it, the public reaction was outrage — at drivers.
        - paragraph [ref=e106]:
          - text: A coalition of car dealers, manufacturers, and auto clubs that the historian Peter Norton calls
          - strong [ref=e107]: motordom
          - text: spent the next decade reversing that verdict. They lobbied for new traffic laws that gave cars legal priority on public roads. They invented the slur
          - emphasis [ref=e108]: jaywalker
          - text: and pushed it relentlessly to recast pedestrians as the problem. By the end of the decade, the street was no longer a shared place. It was a road, and roads were for cars.
        - complementary [ref=e109]:
          - paragraph [ref=e110]: “Motordom redefined the street as a place where people don't belong.”
          - generic [ref=e111]: Peter Norton · Fighting Traffic, 2008
        - figure "1920s American street with mixed pedestrian, streetcar, and auto traffic" [ref=e112]:
          - img "placeholder" [ref=e113]:
            - img [ref=e114]:
              - generic [ref=e137]: ARCHIVAL PHOTO PLACEHOLDER
              - generic [ref=e138]: AMERICAN STREET, c. 1920 · LIBRARY OF CONGRESS
          - generic [ref=e139]: A typical American street before the auto industry's PR campaign. Pedestrians, streetcars, cyclists, and cars share the same right-of-way.
        - paragraph [ref=e140]:
          - text: Once the street was theirs, the engineering profession built its standards around it. The American Association of State Highway and Transportation Officials (AASHTO) published a thick green design manual — the
          - emphasis [ref=e141]: Green Book
          - text: "— that became the reference every state engineer was trained on. It told them how wide to make a lane, how long the sight lines should be, and how fast to design for. Beneath all of it sat one assumption:"
          - strong [ref=e142]: the safest road is the one that forgives a fast driver's mistakes.
        - paragraph [ref=e143]: Wider lanes. Longer sight lines. Higher design speeds. Bigger shoulders. Every parameter pushed in the same direction. Pedestrians and cyclists weren't ignored on purpose — they simply weren't part of the math.
        - paragraph [ref=e144]: This is the assumption everything else on this page dismantles.