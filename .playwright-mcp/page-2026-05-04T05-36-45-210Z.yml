            - img [ref=e280]
          - generic [ref=e282]:
            - paragraph [ref=e283]: Bad drivers exist in every country. So do distractions, fatigue, and impairment. The question is why the same human errors produce a fatality in one place and a fender-bender in another.
            - paragraph [ref=e284]: "Dumbaugh & Li examined fatal crashes across the San Antonio metro area and found they cluster on a specific kind of road: wide arterials with high design speeds and few pedestrian protections. Streets with shorter blocks and narrower lanes had a fraction of the fatalities, even though plenty of bad drivers used them too. The road geometry — not driver behavior — is what makes a mistake deadly."
            - paragraph [ref=e285]: Dumbaugh & Li (2011) · Designing for the Safety of Pedestrians, Cyclists, and Motorists in Urban Environments
