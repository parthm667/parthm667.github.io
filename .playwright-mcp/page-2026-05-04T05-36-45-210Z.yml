        - paragraph [ref=e388]: 08 — About
        - paragraph [ref=e389]: I'm Parth Mhaske, a student at the University of Maryland. In March 2022 I was hit by a car on a road that didn't have a bike lane or a shoulder, designed for traffic moving 45 mph. I walked away with broken bones and a busted wheel. Most people who get hit on roads like that don't walk away. This site is a remediation of an academic paper I wrote about why.
        - paragraph [ref=e390]:
          - link "parthm667.github.io ↗" [ref=e391] [cursor=pointer]:
            - /url: /
          - text: — the rest of my work.
