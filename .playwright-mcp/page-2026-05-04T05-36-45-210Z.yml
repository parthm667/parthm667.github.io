        - paragraph [ref=e89]: 03 — How we got here
        - heading "The streets weren't always for cars." [level=2] [ref=e90]:
          - text: The streets weren't
          - text: always for cars.
      - article [ref=e91]:
        - paragraph [ref=e92]:
          - generic [ref=e93]: I
          - text: n the 1920s, American streets belonged to everyone. Pedestrians, cyclists, streetcars, children, and early autos all shared the same asphalt. When car ownership began to climb and the body count rose with it, the public reaction was outrage — at drivers.
        - paragraph [ref=e94]:
          - text: A coalition of car dealers, manufacturers, and auto clubs that the historian Peter Norton calls
          - strong [ref=e95]: motordom
          - text: spent the next decade reversing that verdict. They lobbied for new traffic laws that gave cars legal priority on public roads. They invented the slur
          - emphasis [ref=e96]: jaywalker
          - text: and pushed it relentlessly to recast pedestrians as the problem. By the end of the decade, the street was no longer a shared place. It was a road, and roads were for cars.
        - complementary [ref=e97]:
          - paragraph [ref=e98]: “Motordom redefined the street as a place where people don't belong.”
          - generic [ref=e99]: Peter Norton · Fighting Traffic, 2008
        - figure "1920s American street with mixed pedestrian, streetcar, and auto traffic" [ref=e100]:
          - img "placeholder" [ref=e101]:
            - img [ref=e102]:
              - generic [ref=e125]: ARCHIVAL PHOTO PLACEHOLDER
              - generic [ref=e126]: AMERICAN STREET, c. 1920 · LIBRARY OF CONGRESS
          - generic [ref=e127]: A typical American street before the auto industry's PR campaign. Pedestrians, streetcars, cyclists, and cars share the same right-of-way.
        - paragraph [ref=e128]:
          - text: Once the street was theirs, the engineering profession built its standards around it. The American Association of State Highway and Transportation Officials (AASHTO) published a thick green design manual — the
          - emphasis [ref=e129]: Green Book
          - text: "— that became the reference every state engineer was trained on. It told them how wide to make a lane, how long the sight lines should be, and how fast to design for. Beneath all of it sat one assumption:"
          - strong [ref=e130]: the safest road is the one that forgives a fast driver's mistakes.
        - paragraph [ref=e131]: Wider lanes. Longer sight lines. Higher design speeds. Bigger shoulders. Every parameter pushed in the same direction. Pedestrians and cyclists weren't ignored on purpose — they simply weren't part of the math.
        - complementary "Interactive lane width demonstrator" [ref=e132]:
