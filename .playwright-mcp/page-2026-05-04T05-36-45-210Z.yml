        - paragraph [ref=e173]: 04 — The counterfactual · Hoboken, NJ
        - heading "7+ years. Zero traffic deaths. One mile from Manhattan." [level=2] [ref=e174]:
          - generic [ref=e175]: 7+ years.
          - emphasis [ref=e177]: Zero traffic deaths.
          - generic [ref=e178]: One mile from Manhattan.
        - paragraph [ref=e179]: Hoboken, New Jersey · pop. 60,419
      - generic [ref=e180]:
        - paragraph [ref=e181]: None of what Hoboken did was expensive. None of it was technically complicated. The four interventions below were paid for through ordinary repaving budgets and signal-software updates — and rolled out citywide over the course of a few years.
        - article [ref=e182]:
          - img [ref=e184]
          - generic [ref=e193]:
            - paragraph [ref=e194]: 01 · High-visibility paint
            - heading "They repainted every crosswalk so drivers had to see them." [level=3] [ref=e195]
            - paragraph [ref=e196]: Continental-style stripes — wide white bars instead of two thin parallel lines. The pattern reads as a stop signal at speed, not a footnote on the asphalt. Hoboken now repaints every crosswalk it passes during routine repaving. The cost is rounding-error.
        - article [ref=e197]:
          - img [ref=e199]
          - generic [ref=e229]:
            - paragraph [ref=e230]: 02 · Daylighting
            - heading "Flexible posts at every corner. Drivers can suddenly see kids." [level=3] [ref=e231]
            - paragraph [ref=e232]: Parking removed for ~25 feet before the crosswalk, replaced with vertical posts. The line of sight between a driver and a pedestrian opens up — neither can hide behind a parked SUV. The interventions cost roughly $200 per corner.
        - article [ref=e233]:
          - img [ref=e235]:
            - generic [ref=e238]: SPEED
            - generic [ref=e239]: LIMIT
            - generic [ref=e240]: "20"
            - generic [ref=e241]: M·P·H
          - generic [ref=e242]:
            - paragraph [ref=e243]: 03 · Speed limit
            - heading "Citywide 20 mph. A ten-percent drop with disproportionate effect." [level=3] [ref=e244]
            - paragraph [ref=e245]: A pedestrian struck at 25 mph has roughly a 1-in-4 chance of dying. At 20 mph it falls to about 1-in-10. Hoboken changed signs, repainted lane widths to match the lower target, and let drivers self-regulate. The street geometry did most of the enforcement.
        - article [ref=e246]:
          - img [ref=e248]:
            - generic [ref=e258]: WAIT
            - generic [ref=e259]: +3s
          - generic [ref=e260]:
            - paragraph [ref=e261]: 04 · Leading pedestrian intervals
            - heading "A three-second head start at every signal." [level=3] [ref=e262]
            - paragraph [ref=e263]: When the light changes, the walk signal goes white before the green. Pedestrians enter the crosswalk first; turning drivers see them already in motion. It costs nothing to add — just a software change at the cabinet — and it eliminates one of the deadliest right-hook conflicts.
        - blockquote [ref=e264]:
          - paragraph [ref=e265]:
            - text: Cars still drive on Hoboken streets. People still get to work.
            - emphasis [ref=e266]: The roads were just redesigned so they don't kill anyone.
