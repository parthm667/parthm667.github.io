        - paragraph [ref=e151]: 04 — The counterfactual · Hoboken, NJ
        - heading "7+ years. Zero traffic deaths. One mile from Manhattan." [level=2] [ref=e152]:
          - generic [ref=e153]: 7+ years.
          - emphasis [ref=e155]: Zero traffic deaths.
          - generic [ref=e156]: One mile from Manhattan.
        - paragraph [ref=e157]: Hoboken, New Jersey · pop. 60,419
      - generic [ref=e158]:
        - paragraph [ref=e159]: None of what Hoboken did was expensive. None of it was technically complicated. The four interventions below were paid for through ordinary repaving budgets and signal-software updates — and rolled out citywide over the course of a few years.
        - article [ref=e160]:
          - img [ref=e162]
          - generic [ref=e171]:
            - paragraph [ref=e172]: 01 · High-visibility paint
            - heading "They repainted every crosswalk so drivers had to see them." [level=3] [ref=e173]
            - paragraph [ref=e174]: Continental-style stripes — wide white bars instead of two thin parallel lines. The pattern reads as a stop signal at speed, not a footnote on the asphalt. Hoboken now repaints every crosswalk it passes during routine repaving. The cost is rounding-error.
        - article [ref=e175]:
          - img [ref=e177]
          - generic [ref=e207]:
            - paragraph [ref=e208]: 02 · Daylighting
            - heading "Flexible posts at every corner. Drivers can suddenly see kids." [level=3] [ref=e209]
            - paragraph [ref=e210]: Parking removed for ~25 feet before the crosswalk, replaced with vertical posts. The line of sight between a driver and a pedestrian opens up — neither can hide behind a parked SUV. The interventions cost roughly $200 per corner.
        - article [ref=e211]:
          - img [ref=e213]:
            - generic [ref=e216]: SPEED
            - generic [ref=e217]: LIMIT
            - generic [ref=e218]: "20"
            - generic [ref=e219]: M·P·H
          - generic [ref=e220]:
            - paragraph [ref=e221]: 03 · Speed limit
            - heading "Citywide 20 mph. A ten-percent drop with disproportionate effect." [level=3] [ref=e222]
            - paragraph [ref=e223]: A pedestrian struck at 25 mph has roughly a 1-in-4 chance of dying. At 20 mph it falls to about 1-in-10. Hoboken changed signs, repainted lane widths to match the lower target, and let drivers self-regulate. The street geometry did most of the enforcement.
        - article [ref=e224]:
          - img [ref=e226]:
            - generic [ref=e236]: WAIT
            - generic [ref=e237]: +3s
          - generic [ref=e238]:
            - paragraph [ref=e239]: 04 · Leading pedestrian intervals
            - heading "A three-second head start at every signal." [level=3] [ref=e240]
            - paragraph [ref=e241]: When the light changes, the walk signal goes white before the green. Pedestrians enter the crosswalk first; turning drivers see them already in motion. It costs nothing to add — just a software change at the cabinet — and it eliminates one of the deadliest right-hook conflicts.
        - blockquote [ref=e242]:
          - paragraph [ref=e243]:
            - text: Cars still drive on Hoboken streets. People still get to work.
            - emphasis [ref=e244]: The roads were just redesigned so they don't kill anyone.
